services:
  - type: web
    name: otobus-fiyat-paneli
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: app-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
